# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

release:
  disable: true

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    flags:
      - -trimpath

archives:
  - formats: tar.gz
    name_template: >-
      {{ replace .ProjectName "-" "_" }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - completions/*

nfpms:
  - file_name_template: '{{ replace .ProjectName "-" "_" }}_{{ .Version }}_{{ .Arch }}'
    license: MIT
    maintainer: Joshua Cowie-Willox <joshwillox@gmail.com>
    homepage: https://github.com/jcwillox/node-alias
    description: "A smart alias for all node package managers"
    bindir: /usr/bin
    formats:
      - apk
      - rpm
      - deb
    contents:
      - src: completions/node-alias.zsh
        dst: /usr/share/zsh/vendor-completions/_node-alias
      - src: completions/node-alias.fish
        dst: /usr/share/fish/vendor_completions.d/node-alias.fish
      - src: completions/node-alias.bash
        dst: /etc/bash_completion.d/node-alias

checksum:
  name_template: 'checksums.txt'

homebrew_casks:
  - name: node-alias
    homepage: https://github.com/jcwillox/node-alias
    description: "A smart alias for all node package managers"
    license: MIT
    completions:
      bash: completions/node-alias.bash
      zsh: completions/node-alias.zsh
      fish: completions/node-alias.fish
    url:
      template: "https://github.com/jcwillox/node-alias/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "{{ .ProjectName }}: Update to version {{ .Version }}"
    skip_upload: "{{ if .IsSnapshot }}true{{ end }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/node-alias"]
          end
    repository:
      owner: jcwillox
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GORELEASER_PUBLISH_TOKEN }}"

scoops:
  - name: node-alias
    homepage: https://github.com/jcwillox/node-alias
    description: "A smart alias for all node package managers"
    license: MIT
    url_template: "https://github.com/jcwillox/node-alias/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "{{ .ProjectName }}: Update to version {{ .Version }}"
    skip_upload: "{{ if .IsSnapshot }}true{{ end }}"
    repository:
      owner: jcwillox
      name: scoop-bucket
      branch: master
      token: "{{ .Env.GORELEASER_PUBLISH_TOKEN }}"
    directory: bucket
